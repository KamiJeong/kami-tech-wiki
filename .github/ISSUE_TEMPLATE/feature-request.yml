name: 기능 구현 요청
description: 구현하고 싶은 기능을 설명해주세요. AI가 스펙 작성부터 구현까지 자동으로 진행합니다.
title: "[Feature] "
labels:
  - "ai: queued"
body:
  - type: markdown
    attributes:
      value: |
        구현하고자 하는 내용을 자유롭게 작성해주세요.
        기술적인 세부 사항은 AI가 자동으로 분석하여 스펙과 구현 계획을 만들어 드립니다.

  - type: textarea
    id: summary
    attributes:
      label: 구현 내용 요약
      description: 어떤 기능을 만들고 싶은지 설명해주세요. 목적, 기대 결과, 참고 사항 등을 포함하면 더욱 좋습니다.
      placeholder: |
        예시: wiki 홈페이지에 최근 업데이트된 문서 목록을 보여주는 섹션을 추가하고 싶습니다.
        - 최근 7일 이내에 수정된 문서를 최대 10개까지 보여줍니다.
        - 문서 제목, 수정일, 카테고리를 표시합니다.
    validations:
      required: true

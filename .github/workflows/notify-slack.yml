name: Notify Slack on Main Push

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    environment: PROD_ENV
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Compute changed files
        run: |
          BEFORE="${{ github.event.before }}"
          SHA="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            FILES_CREATED=$(git diff-tree --no-commit-id --name-only -r HEAD | tr '\n' ',' | sed 's/,$//')
            FILES_MODIFIED=""
            FILES_DELETED=""
          else
            FILES_CREATED=$(git diff --name-only --diff-filter=A "$BEFORE" "$SHA" | tr '\n' ',' | sed 's/,$//')
            FILES_MODIFIED=$(git diff --name-only --diff-filter=M "$BEFORE" "$SHA" | tr '\n' ',' | sed 's/,$//')
            FILES_DELETED=$(git diff --name-only --diff-filter=D "$BEFORE" "$SHA" | tr '\n' ',' | sed 's/,$//')
          fi

          echo "FILES_CREATED=$FILES_CREATED" >> "$GITHUB_ENV"
          echo "FILES_MODIFIED=$FILES_MODIFIED" >> "$GITHUB_ENV"
          echo "FILES_DELETED=$FILES_DELETED" >> "$GITHUB_ENV"

      - name: Set commit metadata
        run: |
          echo "COMMIT_SHA=${{ github.sha }}" >> "$GITHUB_ENV"
          echo "COMMIT_SHORT=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_ENV"
          AUTHOR="${{ github.event.head_commit.author.name }}"
          echo "AUTHOR=$AUTHOR" >> "$GITHUB_ENV"
          echo "COMMIT_MSG=${{ github.event.head_commit.message }}" >> "$GITHUB_ENV"
          echo "REPOSITORY=${{ github.repository }}" >> "$GITHUB_ENV"
          echo "BRANCH=${{ github.ref_name }}" >> "$GITHUB_ENV"
          echo "TIMESTAMP=${{ github.event.head_commit.timestamp }}" >> "$GITHUB_ENV"

      - name: Mask webhook URL
        run: echo "::add-mask::$SLACK_WEBHOOK_URL"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Send Slack notification
        run: bun run .wiki/scripts/notify-slack-ci.ts
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

installed: []
settings:
  auto_execute_hooks: true
hooks:
  before_constitution:
  - extension: git
    command: speckit.git.initialize
    enabled: true
    optional: false
    prompt: Execute speckit.git.initialize?
    description: Initialize Git repository before constitution setup
    condition: null
  before_specify:
  - extension: git
    command: speckit.git.feature
    enabled: true
    optional: false
    prompt: Execute speckit.git.feature?
    description: Create feature branch before specification
    condition: null
  before_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Execute speckit.git.commit
    description: Auto-commit before spec clarification
    condition: null
  before_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Execute speckit.git.commit
    description: Auto-commit before implementation planning
    condition: null
  - extension: version-guard
    command: speckit.version-guard.check
    enabled: true
    optional: false
    prompt: Execute speckit.version-guard.check?
    description: Verify tech stack versions and write constraints before planning
    condition: null
  before_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Execute speckit.git.commit
    description: Auto-commit before task generation
    condition: null
  - extension: docguard
    command: speckit.docguard.review
    enabled: true
    optional: true
    prompt: Review documentation consistency before generating tasks?
    description: ''
    condition: null
  - extension: version-guard
    command: speckit.version-guard.load
    enabled: true
    optional: false
    prompt: Execute speckit.version-guard.load?
    description: Load version guard constraints into context before task generation
    condition: null
  before_implement:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Execute speckit.git.commit
    description: Auto-commit before implementation
    condition: null
  - extension: version-guard
    command: speckit.version-guard.load
    enabled: true
    optional: false
    prompt: Execute speckit.version-guard.load?
    description: Load version guard constraints into context before code generation
    condition: null
  before_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Execute speckit.git.commit
    description: Auto-commit before checklist generation
    condition: null
  before_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Execute speckit.git.commit
    description: Auto-commit before analysis
    condition: null
  before_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Execute speckit.git.commit
    description: Auto-commit before tasks-to-issues conversion
    condition: null
  after_constitution:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Execute speckit.git.commit
    description: Auto-commit after constitution update
    condition: null
  after_specify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Execute speckit.git.commit
    description: Auto-commit after specification
    condition: null
  - extension: token-analyzer
    command: speckit.token-analyzer.baseline
    enabled: true
    optional: false
    prompt: Execute speckit.token-analyzer.baseline
    description: Capture token metrics after specification generation
    condition: null
  after_clarify:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Execute speckit.git.commit
    description: Auto-commit after spec clarification
    condition: null
  after_plan:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Execute speckit.git.commit
    description: Auto-commit after implementation planning
    condition: null
  - extension: token-analyzer
    command: speckit.token-analyzer.baseline
    enabled: true
    optional: false
    prompt: Execute speckit.token-analyzer.baseline
    description: Capture token metrics after implementation planning
    condition: null
  after_tasks:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Execute speckit.git.commit
    description: Auto-commit after task generation
    condition: null
  - extension: docguard
    command: speckit.docguard.score
    enabled: true
    optional: true
    prompt: Show CDD maturity score after task generation?
    description: ''
    condition: null
  - extension: token-analyzer
    command: speckit.token-analyzer.baseline
    enabled: true
    optional: false
    prompt: Execute speckit.token-analyzer.baseline
    description: Capture token metrics after task generation
    condition: null
  after_implement:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Execute speckit.git.commit
    description: Auto-commit after implementation
    condition: null
  - extension: docguard
    command: speckit.docguard.guard
    enabled: true
    optional: true
    prompt: Run DocGuard validation after implementation?
    description: Quality gate — ensures docs stay in sync with code
    condition: null
  - extension: verify
    command: speckit.verify.run
    enabled: true
    optional: true
    prompt: Run verify to validate implementation against specification?
    description: Post-implementation verification gate
    condition: null
  - extension: verify-tasks
    command: speckit.verify-tasks.run
    enabled: true
    optional: true
    prompt: Run verify-tasks in a fresh session to check for phantom completions
    description: Post-implementation phantom completion detector
    condition: null
  - extension: version-guard
    command: speckit.version-guard.validate
    enabled: true
    optional: false
    prompt: Execute speckit.version-guard.validate?
    description: Scan generated code for version-incompatible API patterns
    condition: null
  - extension: token-analyzer
    command: speckit.token-analyzer.baseline
    enabled: true
    optional: false
    prompt: Execute speckit.token-analyzer.baseline
    description: Capture token metrics after implementation
    condition: null
  after_checklist:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Execute speckit.git.commit
    description: Auto-commit after checklist generation
    condition: null
  after_analyze:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Execute speckit.git.commit
    description: Auto-commit after analysis
    condition: null
  after_taskstoissues:
  - extension: git
    command: speckit.git.commit
    enabled: true
    optional: false
    prompt: Execute speckit.git.commit
    description: Auto-commit after tasks-to-issues conversion
    condition: null
